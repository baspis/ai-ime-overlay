name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Build app
        id: build
        run: |
          set -euo pipefail
          export DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          ./scripts/build-release.sh 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"
          APP_PATH="$DERIVED_DATA/Build/Products/Release/AIIMEOverlay.app"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Report compile errors on failure
        if: failure()
        run: |
          echo "::group::Compile errors"
          grep -E " error:" "$RUNNER_TEMP/xcodebuild.log" || echo "(no 'error:' lines in log)"
          echo "::endgroup::"

      - name: Create zip
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${GITHUB_SHA:0:7}"
          fi
          ZIP_NAME="AIIMEOverlay-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$RUNNER_TEMP/$ZIP_NAME"
          echo "ZIP_PATH=$RUNNER_TEMP/$ZIP_NAME" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
