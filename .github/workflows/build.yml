name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Build
        id: build
        run: |
          set -euo pipefail
          export DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          ./scripts/build-release.sh 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: Report compile errors on failure
        if: failure()
        run: |
          echo "::group::Compile errors"
          grep -E " error:" "$RUNNER_TEMP/xcodebuild.log" || echo "(no 'error:' lines in log)"
          echo "::endgroup::"
